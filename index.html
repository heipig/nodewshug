<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>液态时刻 | Liquid Moment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f0c29;
        }

        /* 极光背景层 - 纯CSS conic-gradient 旋转 */
        .aurora {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                #0f0c29 0deg,
                #302b63 60deg,
                #24243e 120deg,
                #0f3460 180deg,
                #533483 240deg,
                #24243e 300deg,
                #0f0c29 360deg
            );
            animation: rotate 20s linear infinite;
            z-index: -2;
            opacity: 0.8;
        }

        /* 噪点纹理层 - 使用SVG data URI，无外部图片请求 */
        .noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        /* 玻璃卡片 - 核心视觉元素 */
        .card {
            position: relative;
            width: min(420px, 90vw);
            padding: 48px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 
                0 12px 40px 0 rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        /* 顶部装饰线 */
        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            border-radius: 2px;
        }

        .label {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .time {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 200;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 400;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 0 auto 24px;
        }

        .quote {
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-secondary);
            font-style: italic;
            max-width: 280px;
            margin: 0 auto;
        }

        /* 呼吸灯效果 - 纯CSS */
        .pulse {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 6px;
            height: 6px;
            background: #00d9ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00d9ff;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .card { padding: 36px 28px; }
            .label { letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div class="aurora"></div>
    <div class="noise"></div>
    
    <main class="card">
        <div class="pulse" aria-hidden="true"></div>
        <div class="label">Current Time</div>
        <div class="time" id="clock">00:00:00</div>
        <div class="date" id="date">载入中...</div>
        <div class="divider"></div>
        <p class="quote" id="quote">时间是一条金河，莫让它从指间流过。</p>
    </main>

    <script>
        // 极简逻辑：仅更新时钟，无框架，无库
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const quotes = [
            "时间是一条金河，莫让它从指间流过。",
            "此刻即永恒。",
            "宁静致远，淡泊明志。",
            "每一个当下，都是过去的未来。",
            "岁月不居，时节如流。"
        ];

        // 随机每日一句（基于日期种子，同一天不变）
        const today = new Date();
        const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
        document.getElementById('quote').textContent = quotes[seed % quotes.length];

        function update() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `${h}:${m}:${s}`;
            
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            dateEl.textContent = now.toLocaleDateString('zh-CN', options);
        }

        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
